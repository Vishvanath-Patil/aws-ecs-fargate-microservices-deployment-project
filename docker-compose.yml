services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devconnect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devconnect}
      POSTGRES_DB: ${POSTGRES_DB:-devconnect}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  auth-service:
    build: ./auth-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-devconnect}:${POSTGRES_PASSWORD:-devconnect}@database:5432/${POSTGRES_DB:-devconnect}
      JWT_SECRET: ${JWT_SECRET:-devconnect-local-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "8001:8000"
    depends_on:
      database:
        condition: service_healthy

  user-service:
    build: ./user-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-devconnect}:${POSTGRES_PASSWORD:-devconnect}@database:5432/${POSTGRES_DB:-devconnect}
      JWT_SECRET: ${JWT_SECRET:-devconnect-local-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "8002:8000"
    depends_on:
      database:
        condition: service_healthy

  post-service:
    build: ./post-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-devconnect}:${POSTGRES_PASSWORD:-devconnect}@database:5432/${POSTGRES_DB:-devconnect}
      JWT_SECRET: ${JWT_SECRET:-devconnect-local-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "8003:8000"
    depends_on:
      database:
        condition: service_healthy

  like-service:
    build: ./like-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-devconnect}:${POSTGRES_PASSWORD:-devconnect}@database:5432/${POSTGRES_DB:-devconnect}
      JWT_SECRET: ${JWT_SECRET:-devconnect-local-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "8004:8000"
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - auth-service
      - user-service
      - post-service
      - like-service

volumes:
  postgres-data:
